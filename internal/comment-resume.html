<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Résumé Review — Comment Mode</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<style>
  :root{--bg:#0f1115;--panel:#171a21;--panel2:#1f232c;--border:#2a2f3a;--text:#e6e8ee;--mute:#8b94a7;--accent:#f0b86e;--accent2:#7fb3ff;--ok:#7fc97f;--warn:#ffb347;}
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font:14px/1.55 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
  header{position:sticky;top:0;z-index:10;background:rgba(15,17,21,.95);backdrop-filter:blur(8px);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
  header h1{font-size:14px;margin:0;font-weight:600;letter-spacing:.02em}
  header .stat{color:var(--mute);font-size:12px;font-variant-numeric:tabular-nums}
  header button{background:var(--accent);color:#1a1208;border:0;padding:8px 14px;border-radius:6px;font-weight:600;cursor:pointer;font-size:13px}
  header button.secondary{background:var(--panel2);color:var(--text);border:1px solid var(--border);font-weight:500}
  header button:hover{filter:brightness(1.1)}
  main{max-width:920px;margin:0 auto;padding:24px}
  .card{background:var(--panel);border:1px solid var(--border);border-radius:8px;margin-bottom:18px;overflow:hidden;transition:border-color .15s}
  .card.has-comment{border-color:var(--accent)}
  .card-head{padding:14px 18px;background:var(--panel2);border-bottom:1px solid var(--border);display:flex;align-items:baseline;justify-content:space-between;gap:12px}
  .card-head .label{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--mute)}
  .card-head .title{font-size:14px;font-weight:600;margin:2px 0 0}
  .card-head .meta{font-size:12px;color:var(--mute);text-align:right;white-space:nowrap}
  .card-body{padding:14px 18px;color:#cfd3dd;font-size:13.5px;line-height:1.65}
  .card-body p{margin:0 0 8px}
  .card-body ul{margin:6px 0 0;padding-left:18px}
  .card-body li{margin:3px 0}
  .card-body em{color:var(--mute);font-style:normal}
  .card-body .role{display:block;color:var(--accent2);font-size:12.5px;margin:0 0 6px}
  textarea{width:100%;min-height:60px;background:#0c0e12;color:var(--text);border:1px solid var(--border);border-radius:0;border-top:1px solid var(--border);padding:12px 18px;font:13px/1.5 ui-monospace,"SF Mono",Menlo,monospace;resize:vertical;outline:none;display:block}
  textarea:focus{border-color:var(--accent);background:#10131a}
  textarea::placeholder{color:#4a5160}
  .quick{padding:8px 18px;background:#0c0e12;border-top:1px solid var(--border);display:flex;gap:6px;flex-wrap:wrap}
  .quick button{background:transparent;border:1px solid var(--border);color:var(--mute);padding:3px 8px;border-radius:4px;font-size:11px;cursor:pointer}
  .quick button:hover{border-color:var(--accent);color:var(--text)}
  details{background:var(--panel2);border:1px solid var(--border);border-radius:8px;margin-top:24px}
  details summary{padding:14px 18px;cursor:pointer;font-weight:600}
  details pre{margin:0;padding:0 18px 18px;white-space:pre-wrap;font:12px/1.5 ui-monospace,"SF Mono",Menlo,monospace;color:#cfd3dd;max-height:480px;overflow:auto}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--ok);color:#0a1a0a;padding:10px 18px;border-radius:6px;font-weight:600;opacity:0;transition:opacity .25s;pointer-events:none;z-index:20}
  .toast.show{opacity:1}
  .section-divider{margin:32px 0 14px;font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--mute);border-bottom:1px solid var(--border);padding-bottom:8px}
</style>
</head>

const QUICK = ["cut this","tighten this","reword","reorder","add metric","too jargony","too vague","mix up Chinese/English","NDA — vague this","fine ✓"];
const STORE = "resume_review_v1";

// ─── Render ───────────────────────────────────────────────────────────────
function load(){try{return JSON.parse(localStorage.getItem(STORE)||"{}")}catch{return{}}}
function save(d){localStorage.setItem(STORE,JSON.stringify(d))}
const state = load();

const root = document.getElementById("root");
let lastGroup = null;
SECTIONS.forEach(sec => {
  if (sec.group !== lastGroup){
    const div = document.createElement("div");
    div.className = "section-divider";
    div.textContent = sec.group;
    root.appendChild(div);
    lastGroup = sec.group;
  }
  const card = document.createElement("section");
  card.className = "card";
  card.id = "card-" + sec.id;
  card.innerHTML = `
    <div class="card-head">
      <div>
        <div class="label">${sec.group}</div>
        <div class="title">${sec.title}</div>
      </div>
      ${sec.meta ? `<div class="meta">${sec.meta}</div>` : ""}
    </div>
    <div class="card-body">${sec.body}</div>
    <textarea data-id="${sec.id}" placeholder="Comments / fixes / cuts for this section…">${(state[sec.id]||"").replace(/</g,"&lt;")}</textarea>
    <div class="quick" data-quick-for="${sec.id}">
      ${QUICK.map(q=>`<button type="button" data-q="${q}">${q}</button>`).join("")}
    </div>`;
  root.appendChild(card);
  if (state[sec.id]) card.classList.add("has-comment");
});

// ─── Persistence + interactions ───────────────────────────────────────────
root.addEventListener("input", e => {
  if (e.target.tagName !== "TEXTAREA") return;
  const id = e.target.dataset.id;
  state[id] = e.target.value;
  save(state);
  document.getElementById("card-"+id).classList.toggle("has-comment", !!e.target.value.trim());
  updateStat();
});

root.addEventListener("click", e => {
  const btn = e.target.closest("[data-q]");
  if (!btn) return;
  const id = btn.parentElement.dataset.quickFor;
  const ta = document.querySelector(`textarea[data-id="${id}"]`);
  const phrase = btn.dataset.q;
  ta.value = ta.value ? `${ta.value} · ${phrase}` : phrase;
  ta.dispatchEvent(new Event("input", {bubbles:true}));
});

function updateStat(){
  const n = SECTIONS.filter(s => (state[s.id]||"").trim()).length;
  document.getElementById("stat").textContent = `${n} / ${SECTIONS.length} commented`;
}
updateStat();

// ─── Export ───────────────────────────────────────────────────────────────
function buildExport(){
  const lines = ["# Résumé review comments", "_generated " + new Date().toISOString().slice(0,16).replace("T"," ") + "_", ""];
  let group = null;
  SECTIONS.forEach(sec => {
    const c = (state[sec.id]||"").trim();
    if (!c) return;
    if (sec.group !== group){ lines.push("", "## " + sec.group, ""); group = sec.group; }
    lines.push(`### ${sec.title}${sec.meta?` — ${sec.meta}`:""}  \`[${sec.id}]\``);
    lines.push(c);
    lines.push("");
  });
  if (lines.length <= 3) lines.push("_(no comments yet)_");
  return lines.join("\n");
}

function toast(msg, ok=true){
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.style.background = ok ? "var(--ok)" : "var(--warn)";
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"), 1800);
}

async function copyAll(){
  const txt = buildExport();
  try { await navigator.clipboard.writeText(txt); toast("Copied — paste into chat"); }
  catch { toast("Clipboard blocked — use Download .md", false); }
}

function exportFile(){
  const txt = buildExport();
  const blob = new Blob([txt], {type:"text/markdown"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "resume-review-" + new Date().toISOString().slice(0,10) + ".md";
  a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href), 1000);
  toast("Downloaded");
}

function clearAll(){
  if (!confirm("Clear all comments?")) return;
  Object.keys(state).forEach(k => delete state[k]);
  save(state);
  document.querySelectorAll("textarea").forEach(t => t.value = "");
  document.querySelectorAll(".card").forEach(c => c.classList.remove("has-comment"));
  updateStat();
  toast("Cleared");
}

// Add a preview pane at bottom
const preview = document.createElement("details");
preview.innerHTML = `<summary>Preview export (live)</summary><pre id="preview"></pre>`;
document.querySelector("main").appendChild(preview);
function refreshPreview(){ document.getElementById("preview").textContent = buildExport(); }
preview.addEventListener("toggle", refreshPreview);
root.addEventListener("input", refreshPreview);
</script>
</body>
</html>
