name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
    - uses: actions/checkout@v4

    - name: Setup Pages
      uses: actions/configure-pages@v4

    - name: Stage public files (exclude internal/ knowledge docs)
      run: |
        mkdir -p _site
        rsync -a \
          --exclude='_site' \
          --exclude='.git' \
          --exclude='.github' \
          --exclude='internal/' \
          --exclude='.gitignore' \
          ./ _site/
        echo "Staged contents:"
        ls -la _site/
        echo "Confirming internal/ excluded:"
        test ! -d _site/internal && echo "OK: internal/ not in artifact"

    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: _site
    
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4 